name: Daily Dashboard Update

on:
  # Corre todos los dias a las 12:00 UTC = 6:00 AM hora de El Salvador
  schedule:
    - cron: '0 12 * * *'

  # Tambien permite correrlo manualmente desde la pestana Actions en GitHub
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para hacer commit del HTML actualizado

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard updater
        run: python update_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csl_apopa_viento.html
          git diff --staged --quiet || git commit -m "chore: auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
